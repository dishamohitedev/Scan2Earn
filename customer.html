<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan2Earn | Customer Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --card-bg: #ffffff;
    }
    html.dark {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1e;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: #2a2a30;
      --card-bg: #1f1f24;
    }
    body { background-color: var(--bg-primary); color: var(--text-primary); transition: all 0.3s ease; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-primary); border-radius: 20px; padding: 2rem; max-width: 500px; width: 90%; border: 1px solid var(--border-color); }
    html.dark .bg-white { background-color: var(--card-bg) !important; }
    html.dark .bg-gray-50 { background-color: var(--bg-secondary) !important; }
  </style>
</head>
<body>
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b" style="border-color: var(--border-color);">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2"><i class="fas fa-qrcode text-2xl text-blue-600"></i><span class="font-black text-2xl bg-gradient-to-r from-blue-700 to-purple-700 bg-clip-text text-transparent">Scan2Earn</span></div>
      <div class="flex items-center gap-4"><a href="index.html" class="text-gray-600 hover:text-blue-600"><i class="fas fa-home"></i> Home</a><a href="scan.html" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-camera"></i> Scan QR</a><button id="darkModeToggle" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center"><i id="darkModeIcon" class="fas fa-moon"></i></button></div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-8">
    <div class="text-center mb-8"><h1 class="text-3xl font-bold">My Wallet</h1><p style="color: var(--text-secondary);">Your loyalty points across all stores</p></div>

    <div class="grid md:grid-cols-2 gap-8">
      <div class="rounded-2xl p-6 border bg-gradient-to-r from-blue-500 to-purple-600 text-white">
        <div class="flex justify-between items-start"><div><p class="text-sm opacity-90">Total Points Balance</p><p class="text-5xl font-bold mt-2" id="totalPoints">0</p></div><i class="fas fa-coins text-4xl opacity-50"></i></div>
        <div class="mt-6"><div class="flex justify-between text-sm mb-1"><span>Progress to next reward</span><span id="nextRewardProgress">0/100</span></div><div class="h-2 bg-white/30 rounded-full"><div id="progressBar" class="h-2 bg-white rounded-full" style="width: 0%"></div></div></div>
      </div>

      <div class="rounded-2xl p-6 border" style="background-color: var(--card-bg); border-color: var(--border-color);">
        <h3 class="font-bold mb-3"><i class="fas fa-qrcode text-green-600 mr-2"></i> Quick Scan</h3>
        <p class="text-sm mb-4" style="color: var(--text-secondary);">Scan a store QR code to earn points instantly</p>
        <a href="scan.html" class="block text-center bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition"><i class="fas fa-camera mr-2"></i> Scan to Earn</a>
      </div>
    </div>

    <div class="rounded-2xl p-6 border mt-8" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h2 class="text-xl font-bold mb-4"><i class="fas fa-gift text-purple-600 mr-2"></i> Available Rewards</h2>
      <div id="rewardsList" class="space-y-3"></div>
    </div>

    <div class="rounded-2xl p-6 border mt-8" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h2 class="text-xl font-bold mb-4"><i class="fas fa-history text-blue-600 mr-2"></i> Transaction History</h2>
      <div id="historyList" class="space-y-2"></div>
    </div>
  </div>

  <div id="redeemModal" class="modal"><div class="modal-content"><h2 class="text-xl font-bold mb-4">Redeem Reward</h2><p id="rewardToRedeem" class="mb-4"></p><div class="flex gap-3"><button id="confirmRedeem" class="flex-1 bg-green-600 text-white py-2 rounded-xl">Confirm</button><button id="closeRedeemModal" class="flex-1 border py-2 rounded-xl">Cancel</button></div></div></div>

  <script>
    let currentCustomer = JSON.parse(localStorage.getItem('currentCustomer')) || { address: '0x742d...b0b2', totalPoints: 245, history: [{ action: 'Earned 10 points from Green Bean Coffee', date: new Date().toLocaleDateString(), points: 10 }] };
    let storeData = JSON.parse(localStorage.getItem('storeData')) || { rewards: [{ name: 'Free Coffee', points: 100 }, { name: 'Free Dessert', points: 250 }] };
    let pendingReward = null;
    
    function saveCustomer() { localStorage.setItem('currentCustomer', JSON.stringify(currentCustomer)); }
    
    function updateUI() {
      document.getElementById('totalPoints').innerText = currentCustomer.totalPoints;
      const nextReward = storeData.rewards.find(r => r.points > currentCustomer.totalPoints) || storeData.rewards[0];
      const progress = nextReward ? Math.min(100, (currentCustomer.totalPoints / nextReward.points) * 100) : 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('nextRewardProgress').innerText = `${currentCustomer.totalPoints}/${nextReward?.points || 100}`;
      
      const rewardsDiv = document.getElementById('rewardsList');
      rewardsDiv.innerHTML = storeData.rewards.map(r => `<div class="flex justify-between items-center p-3 rounded-xl border" style="border-color: var(--border-color);"><div><span class="font-medium">${r.name}</span><p class="text-xs" style="color: var(--text-secondary);">${r.points} points required</p></div><button onclick="redeemReward('${r.name}', ${r.points})" class="px-4 py-2 rounded-lg ${currentCustomer.totalPoints >= r.points ? 'bg-purple-600 text-white hover:bg-purple-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}" ${currentCustomer.totalPoints >= r.points ? '' : 'disabled'}>Redeem</button></div>`).join('');
      
      const historyDiv = document.getElementById('historyList');
      historyDiv.innerHTML = currentCustomer.history.slice().reverse().slice(0, 10).map(h => `<div class="flex justify-between items-center p-2 rounded-lg" style="background-color: var(--bg-secondary);"><span><i class="fas ${h.action.includes('Earned') ? 'fa-plus-circle text-green-500' : 'fa-gift text-purple-500'} mr-2"></i>${h.action}</span><span class="text-xs">${h.date}</span></div>`).join('');
    }
    
    window.redeemReward = (name, points) => {
      if (currentCustomer.totalPoints >= points) { pendingReward = { name, points }; document.getElementById('rewardToRedeem').innerText = `Redeem ${name} for ${points} points?`; document.getElementById('redeemModal').classList.add('active'); }
      else alert(`Need ${points - currentCustomer.totalPoints} more points for ${name}`);
    };
    
    document.getElementById('confirmRedeem')?.addEventListener('click', () => {
      if (pendingReward) {
        currentCustomer.totalPoints -= pendingReward.points;
        currentCustomer.history.unshift({ action: `Redeemed ${pendingReward.name}`, date: new Date().toLocaleDateString(), points: -pendingReward.points });
        saveCustomer(); updateUI();
        alert(`🎉 Reward redeemed! ${pendingReward.name} is yours. Show this to the shopkeeper.`);
        document.getElementById('redeemModal').classList.remove('active');
        pendingReward = null;
      }
    });
    
    document.getElementById('closeRedeemModal')?.addEventListener('click', () => document.getElementById('redeemModal').classList.remove('active'));
    
    updateUI();
    
    const toggleBtn = document.getElementById('darkModeToggle'), icon = document.getElementById('darkModeIcon');
    const isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) { document.documentElement.classList.add('dark'); icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
    toggleBtn?.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) { document.documentElement.classList.remove('dark'); localStorage.setItem('darkMode', 'false'); icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }
      else { document.documentElement.classList.add('dark'); localStorage.setItem('darkMode', 'true'); icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
    });
  </script>
</body>
</html>
