<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan2Earn | Customer Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --card-bg: #ffffff;
      --nav-bg: rgba(255,255,255,0.95);
    }
    
    html.dark {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1e;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: #2a2a30;
      --card-bg: #1f1f24;
      --nav-bg: rgba(15,15,18,0.95);
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    
    nav {
      background-color: var(--nav-bg) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg-primary);
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--border-color);
    }
  </style>
</head>
<body>

  <script>
    // Check if user is logged in
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser || currentUser.type !== 'customer') {
      window.location.href = 'login.html';
    }
  </script>

  <nav class="sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <i class="fas fa-qrcode text-2xl text-blue-600"></i>
        <span class="font-black text-2xl bg-gradient-to-r from-blue-700 to-purple-700 bg-clip-text text-transparent">Scan2Earn</span>
      </div>
      <div class="flex items-center gap-4">
        <span style="color: var(--text-secondary);"><i class="fas fa-user"></i> <span id="customerName"></span></span>
        <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-700 transition">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        <button id="darkModeToggle" class="w-10 h-10 rounded-full flex items-center justify-center shadow-sm" style="background-color: var(--bg-secondary);">
          <i id="darkModeIcon" class="fas fa-moon" style="color: var(--text-primary);"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-6 py-8">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold" style="color: var(--text-primary);">My Wallet</h1>
      <p style="color: var(--text-secondary);">Your loyalty points across all stores</p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      <div class="rounded-2xl p-6 border bg-gradient-to-r from-blue-500 to-purple-600 text-white">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-sm opacity-90">Total Points Balance</p>
            <p class="text-5xl font-bold mt-2" id="totalPoints">0</p>
          </div>
          <i class="fas fa-coins text-4xl opacity-50"></i>
        </div>
        <div class="mt-6">
          <div class="flex justify-between text-sm mb-1">
            <span>Progress to next reward</span>
            <span id="nextRewardProgress">0/100</span>
          </div>
          <div class="h-2 bg-white/30 rounded-full">
            <div id="progressBar" class="h-2 bg-white rounded-full" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="rounded-2xl p-6 border" style="background-color: var(--card-bg); border-color: var(--border-color);">
        <h3 class="font-bold mb-3" style="color: var(--text-primary);"><i class="fas fa-qrcode text-green-600 mr-2"></i> Quick Scan</h3>
        <p class="text-sm mb-4" style="color: var(--text-secondary);">Scan a store QR code to earn points instantly</p>
        <a href="scan.html" class="block text-center bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition">
          <i class="fas fa-camera mr-2"></i> Scan to Earn
        </a>
      </div>
    </div>

    <div class="rounded-2xl p-6 border mt-8" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h2 class="text-xl font-bold mb-4" style="color: var(--text-primary);">
        <i class="fas fa-gift text-purple-600 mr-2"></i> Available Rewards
      </h2>
      <div id="rewardsList" class="space-y-3"></div>
    </div>

    <div class="rounded-2xl p-6 border mt-8" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <h2 class="text-xl font-bold mb-4" style="color: var(--text-primary);">
        <i class="fas fa-history text-blue-600 mr-2"></i> Transaction History
      </h2>
      <div id="historyList" class="space-y-2"></div>
    </div>
  </div>

  <div id="redeemModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4" style="color: var(--text-primary);">Redeem Reward</h2>
      <p id="rewardToRedeem" class="mb-4" style="color: var(--text-secondary);"></p>
      <div class="flex gap-3">
        <button id="confirmRedeem" class="flex-1 bg-green-600 text-white py-2 rounded-xl hover:bg-green-700">Confirm</button>
        <button id="closeRedeemModal" class="flex-1 border py-2 rounded-xl" style="border-color: var(--border-color); color: var(--text-primary);">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // Get customer data
    let allUsers = JSON.parse(localStorage.getItem('users'));
    let currentCustomer = allUsers.customers.find(c => c.id === currentUser.id);
    let storeData = JSON.parse(localStorage.getItem('storeData')) || { rewards: [{ name: 'Free Coffee', points: 100 }, { name: 'Free Dessert', points: 250 }] };
    let pendingReward = null;
    
    document.getElementById('customerName').innerText = currentCustomer.name;
    
    function updateCustomerInStorage() {
      allUsers = JSON.parse(localStorage.getItem('users'));
      const index = allUsers.customers.findIndex(c => c.id === currentCustomer.id);
      if (index !== -1) {
        allUsers.customers[index] = currentCustomer;
        localStorage.setItem('users', JSON.stringify(allUsers));
        localStorage.setItem('currentUser', JSON.stringify({ ...currentCustomer, type: 'customer' }));
      }
    }
    
    function updateUI() {
      document.getElementById('totalPoints').innerText = currentCustomer.totalPoints || 0;
      
      // Get rewards from all shops or default
      const allShops = allUsers.shopkeepers;
      let allRewards = [];
      allShops.forEach(shop => {
        if (shop.rewards) {
          shop.rewards.forEach(reward => {
            allRewards.push({ ...reward, shopName: shop.storeName || shop.name });
          });
        }
      });
      
      if (allRewards.length === 0) {
        allRewards = [
          { name: 'Free Coffee', points: 100, shopName: 'Any Store' },
          { name: 'Free Dessert', points: 250, shopName: 'Any Store' }
        ];
      }
      
      const nextReward = allRewards.find(r => r.points > (currentCustomer.totalPoints || 0)) || allRewards[0];
      const progress = nextReward ? Math.min(100, ((currentCustomer.totalPoints || 0) / nextReward.points) * 100) : 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('nextRewardProgress').innerText = `${currentCustomer.totalPoints || 0}/${nextReward?.points || 100}`;
      
      const rewardsDiv = document.getElementById('rewardsList');
      rewardsDiv.innerHTML = allRewards.map(r => `
        <div class="flex justify-between items-center p-3 rounded-xl border" style="border-color: var(--border-color);">
          <div>
            <span class="font-medium" style="color: var(--text-primary);">${r.name}</span>
            <p class="text-xs" style="color: var(--text-secondary);">${r.shopName} • ${r.points} points required</p>
          </div>
          <button onclick="redeemReward('${r.name}', ${r.points}, '${r.shopName}')" 
            class="px-4 py-2 rounded-lg ${(currentCustomer.totalPoints || 0) >= r.points ? 'bg-purple-600 text-white hover:bg-purple-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}" 
            ${(currentCustomer.totalPoints || 0) >= r.points ? '' : 'disabled'}>
            Redeem
          </button>
        </div>
      `).join('');
      
      const historyDiv = document.getElementById('historyList');
      const history = currentCustomer.history || [];
      historyDiv.innerHTML = history.slice().reverse().slice(0, 10).map(h => `
        <div class="flex justify-between items-center p-2 rounded-lg" style="background-color: var(--bg-secondary);">
          <span style="color: var(--text-primary);">
            <i class="fas ${h.action.includes('Earned') ? 'fa-plus-circle text-green-500' : 'fa-gift text-purple-500'} mr-2"></i>
            ${h.action}
          </span>
          <span class="text-xs" style="color: var(--text-secondary);">${h.date}</span>
        </div>
      `).join('');
    }
    
    window.redeemReward = (name, points, shopName) => {
      if ((currentCustomer.totalPoints || 0) >= points) {
        pendingReward = { name, points, shopName };
        document.getElementById('rewardToRedeem').innerText = `Redeem ${name} from ${shopName} for ${points} points?`;
        document.getElementById('redeemModal').classList.add('active');
      }
    };
    
    document.getElementById('confirmRedeem')?.addEventListener('click', () => {
      if (pendingReward) {
        currentCustomer.totalPoints = (currentCustomer.totalPoints || 0) - pendingReward.points;
        currentCustomer.history = currentCustomer.history || [];
        currentCustomer.history.unshift({ 
          action: `Redeemed ${pendingReward.name} from ${pendingReward.shopName}`, 
          date: new Date().toLocaleString(), 
          points: -pendingReward.points 
        });
        updateCustomerInStorage();
        updateUI();
        alert(`🎉 Reward redeemed! ${pendingReward.name} is yours. Show this to the shopkeeper.`);
        document.getElementById('redeemModal').classList.remove('active');
        pendingReward = null;
      }
    });
    
    document.getElementById('closeRedeemModal')?.addEventListener('click', () => {
      document.getElementById('redeemModal').classList.remove('active');
    });
    
    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    });
    
    updateUI();
    
    // Dark mode toggle
    const toggleBtn = document.getElementById('darkModeToggle');
    const icon = document.getElementById('darkModeIcon');
    const isDark = localStorage.getItem('darkMode') === 'true';
    
    if (isDark) { 
      document.documentElement.classList.add('dark'); 
      icon.classList.remove('fa-moon'); 
      icon.classList.add('fa-sun'); 
    }
    
    toggleBtn?.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) { 
        document.documentElement.classList.remove('dark'); 
        localStorage.setItem('darkMode', 'false'); 
        icon.classList.remove('fa-sun'); 
        icon.classList.add('fa-moon'); 
      } else { 
        document.documentElement.classList.add('dark'); 
        localStorage.setItem('darkMode', 'true'); 
        icon.classList.remove('fa-moon'); 
        icon.classList.add('fa-sun'); 
      }
    });
  </script>
</body>
</html>
