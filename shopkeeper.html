<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan2Earn | Shopkeeper Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    * { font-family: 'Inter', sans-serif; }
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --card-bg: #ffffff;
      --nav-bg: rgba(255,255,255,0.95);
      --input-bg: #ffffff;
      --icon-color: #4b5563;
    }
    html.dark {
      --bg-primary: #0f0f12;
      --bg-secondary: #1a1a1e;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: #2a2a30;
      --card-bg: #1f1f24;
      --nav-bg: rgba(15,15,18,0.95);
      --input-bg: #2a2a30;
      --icon-color: #9ca3af;
    }
    body { background-color: var(--bg-primary); color: var(--text-primary); transition: background-color 0.3s ease, color 0.3s ease; }
    nav { background-color: var(--nav-bg) !important; backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); transition: background-color 0.3s ease; }
    input, textarea { 
      background-color: var(--input-bg) !important; 
      border-color: var(--border-color) !important; 
      color: var(--text-primary) !important; 
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6 !important;
      ring: 2px solid #3b82f6;
    }
    label { color: var(--text-secondary) !important; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-primary); border-radius: 20px; padding: 2rem; max-width: 500px; width: 90%; border: 1px solid var(--border-color); transition: background 0.3s ease; }
    button, .btn-transition { transition: all 0.2s ease; }
    .rounded-2xl, .rounded-xl, .rounded-lg { transition: background-color 0.3s ease, border-color 0.3s ease; }
    #darkModeToggle {
      transition: all 0.2s ease;
    }
    #darkModeToggle:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    /* QR code container fix for dark mode */
    #qrcode canvas,
    #qrcode img {
      background-color: white;
      padding: 8px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <nav class="sticky top-0 z-50 border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <i class="fas fa-qrcode text-2xl text-blue-600"></i>
        <span class="font-black text-2xl bg-gradient-to-r from-blue-700 to-purple-700 bg-clip-text text-transparent">Scan2Earn</span>
      </div>
      <div class="flex items-center gap-4">
        <span style="color:var(--text-secondary);"><i class="fas fa-store"></i> <span id="shopNameDisplay">Loading...</span></span>
        <button onclick="doLogout()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-700 transition">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        <button id="darkModeToggle" class="w-10 h-10 rounded-full flex items-center justify-center shadow-sm" style="background-color:var(--bg-secondary); border: 1px solid var(--border-color); cursor: pointer;">
          <i id="darkModeIcon" class="fas fa-moon" style="color:var(--text-primary); font-size: 1.2rem;"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold" style="color:var(--text-primary);">Shopkeeper Dashboard</h1>
        <p style="color:var(--text-secondary);">Manage your store and customer loyalty program</p>
      </div>
      <button onclick="saveStoreSettings()" class="bg-green-600 text-white px-4 py-2 rounded-xl hover:bg-green-700 transition btn-transition">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">

        <div class="rounded-2xl p-6 border" style="background-color:var(--card-bg);border-color:var(--border-color);">
          <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary);">
            <i class="fas fa-store text-blue-600 mr-2"></i> Store Information
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-2">Store Name</label>
              <input type="text" id="storeName" class="w-full px-4 py-2 rounded-xl border">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Description</label>
              <textarea id="storeDesc" rows="2" class="w-full px-4 py-2 rounded-xl border"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Wallet Address</label>
              <div class="flex gap-2">
                <code id="walletAddress" class="flex-1 px-4 py-2 rounded-xl text-sm" style="background-color:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-primary);">Loading...</code>
                <button onclick="copyWallet()" class="px-3 rounded-xl" style="background-color:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-primary);">
                  <i class="fas fa-copy"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-2xl p-6 border" style="background-color:var(--card-bg);border-color:var(--border-color);">
          <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary);">
            <i class="fas fa-tag text-purple-600 mr-2"></i> Reward Rules
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-2">Points per Purchase</label>
              <input type="number" id="pointsPerPurchase" class="w-32 px-4 py-2 rounded-xl border">
            </div>
            <div class="border-t pt-4" style="border-color:var(--border-color);">
              <label class="block text-sm font-medium mb-2">Reward #1</label>
              <div class="grid grid-cols-2 gap-3">
                <input type="text"   id="reward1Name"   placeholder="Reward name" class="px-3 py-2 rounded-xl border">
                <input type="number" id="reward1Points" placeholder="Points"      class="px-3 py-2 rounded-xl border">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Reward #2</label>
              <div class="grid grid-cols-2 gap-3">
                <input type="text"   id="reward2Name"   placeholder="Reward name" class="px-3 py-2 rounded-xl border">
                <input type="number" id="reward2Points" placeholder="Points"      class="px-3 py-2 rounded-xl border">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <div class="rounded-2xl p-6 border text-center" style="background-color:var(--card-bg);border-color:var(--border-color);">
          <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary);">
            <i class="fas fa-qrcode text-green-600 mr-2"></i> Store QR Code
          </h2>
          <div id="qrcode" class="flex justify-center mb-4"></div>
          <button onclick="downloadQR()" class="w-full bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition btn-transition">
            <i class="fas fa-download mr-2"></i> Download QR
          </button>
        </div>

        <div class="rounded-2xl p-6 border" style="background-color:var(--card-bg);border-color:var(--border-color);">
          <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary);">
            <i class="fas fa-bolt text-yellow-600 mr-2"></i> Quick Actions
          </h2>
          <div class="space-y-3">
            <button onclick="openAwardModal()" class="w-full bg-purple-600 text-white py-3 rounded-xl hover:bg-purple-700 transition btn-transition">
              <i class="fas fa-plus-circle"></i> Award Points
            </button>
            <button onclick="window.open('scan.html','_blank')" class="w-full border py-3 rounded-xl transition hover:bg-opacity-10 hover:bg-gray-500" style="border-color:var(--border-color);color:var(--text-primary);">
              <i class="fas fa-qrcode"></i> Test Scan QR
            </button>
          </div>
        </div>

        <div class="rounded-2xl p-6 border" style="background-color:var(--card-bg);border-color:var(--border-color);">
          <h2 class="text-sm font-semibold uppercase tracking-wide mb-3" style="color:var(--text-secondary);">Blockchain Status</h2>
          <div class="space-y-2 text-sm">
            <div class="flex justify-between"><span style="color:var(--text-secondary);">Network:</span><span class="text-green-600">Base Sepolia ✓</span></div>
            <div class="flex justify-between"><span style="color:var(--text-secondary);">Gasless:</span><span class="text-green-600">UGF Active ✓</span></div>
            <div class="flex justify-between"><span style="color:var(--text-secondary);">Token:</span><span style="color:var(--text-primary);">S2E Points</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Award Points Modal -->
  <div id="pointsModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4" style="color:var(--text-primary);">Award Points</h2>
      <input type="text"   id="customerAddress" placeholder="Customer Wallet Address" class="w-full mb-3 px-4 py-2 rounded-xl border">
      <input type="number" id="pointsAmount" value="10" class="w-full mb-4 px-4 py-2 rounded-xl border">
      <div class="flex gap-3">
        <button onclick="submitPoints()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700 transition">Award</button>
        <button onclick="closeModal()"   class="flex-1 border py-2 rounded-xl transition hover:bg-opacity-10 hover:bg-gray-500" style="border-color:var(--border-color);color:var(--text-primary);">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── Step 1: Read from localStorage IMMEDIATELY (no async wait) ─────────
    var currentUser = null;
    try {
      var raw = localStorage.getItem('currentUser');
      if (raw) currentUser = JSON.parse(raw);
    } catch(e) {}

    // ── Step 2: Check if user is a shopkeeper right away ───────────────────
    var hasShopRole = currentUser &&
      ((currentUser.type === 'shopkeeper') ||
       (currentUser.roles && currentUser.roles.shopkeeper));

    if (!hasShopRole) {
      window.location.href = 'login.html';
    } else {
      // Load dashboard immediately from localStorage data
      loadDashboard(currentUser);
    }

    // ── Step 3: Firebase init (for save/award operations only) ─────────────
    firebase.initializeApp({
      apiKey: "AIzaSyA1W9R3bLBEf4eAJL9wiNHbmn183IPBtrk",
      authDomain: "scan2earn-771b6.firebaseapp.com",
      projectId: "scan2earn-771b6",
      storageBucket: "scan2earn-771b6.firebasestorage.app",
      messagingSenderId: "511366033486",
      appId: "1:511366033486:web:6de6dd63e06088aac8131f"
    });
    var auth = firebase.auth();
    var db   = firebase.firestore();
    var currentUid = currentUser ? currentUser.uid : null;

    // ── Step 4: Silently refresh from Firestore in background ──────────────
    auth.onAuthStateChanged(async function(user) {
      if (!user) return; // don't redirect — localStorage already verified
      currentUid = user.uid;
      try {
        var snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists) {
          currentUser = snap.data();
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          loadDashboard(currentUser); // refresh with latest Firestore data
        }
      } catch(e) {}
    });

    // ── Load dashboard UI ──────────────────────────────────────────────────
    function loadDashboard(data) {
      var shopRole  = (data.roles && data.roles.shopkeeper) ? data.roles.shopkeeper : data;
      var storeName = shopRole.storeName  || data.storeName  || data.name  || '';
      var storeDesc = shopRole.storeDesc  || data.storeDesc  || '';
      var pointsPer = shopRole.pointsPerPurchase || data.pointsPerPurchase || 10;
      var rewards   = shopRole.rewards    || data.rewards    ||
                      [{ name: 'Free Coffee', points: 100 }, { name: 'Free Dessert', points: 250 }];

      document.getElementById('shopNameDisplay').innerText  = storeName;
      document.getElementById('storeName').value            = storeName;
      document.getElementById('storeDesc').value            = storeDesc;
      document.getElementById('walletAddress').innerText    = data.walletAddress || '0x...';
      document.getElementById('pointsPerPurchase').value    = pointsPer;
      document.getElementById('reward1Name').value          = rewards[0]?.name   || 'Free Coffee';
      document.getElementById('reward1Points').value        = rewards[0]?.points || 100;
      document.getElementById('reward2Name').value          = rewards[1]?.name   || 'Free Dessert';
      document.getElementById('reward2Points').value        = rewards[1]?.points || 250;

      // QR Code - regenerate with fresh data
      var qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      var qrData = JSON.stringify({ storeId: data.uid, storeName: storeName, action: 'earn_points', pointsValue: pointsPer });
      var qrUrl = 'https://scan2earn.app/scan?data=' + encodeURIComponent(qrData);
      try {
        new QRCode(qrContainer, {
          text: qrUrl,
          width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
      } catch(e) {
        console.warn("QR generation error", e);
        qrContainer.innerHTML = '<div class="p-4 bg-gray-100 rounded">QR Code Generator Ready</div>';
      }
    }

    // ── Save settings ──────────────────────────────────────────────────────
    async function saveStoreSettings() {
      if (!currentUid) { alert('Not logged in'); return; }
      var storeName = document.getElementById('storeName').value.trim();
      var storeDesc = document.getElementById('storeDesc').value.trim();
      var pointsPer = parseInt(document.getElementById('pointsPerPurchase').value) || 10;
      var rewards   = [
        { name: document.getElementById('reward1Name').value,   points: parseInt(document.getElementById('reward1Points').value)   || 100 },
        { name: document.getElementById('reward2Name').value,   points: parseInt(document.getElementById('reward2Points').value)   || 250 }
      ];
      try {
        var snap = await db.collection('users').doc(currentUid).get();
        var data = snap.data();
        if (data.roles && data.roles.shopkeeper) {
          await db.collection('users').doc(currentUid).update({
            'roles.shopkeeper.storeName': storeName,
            'roles.shopkeeper.storeDesc': storeDesc,
            'roles.shopkeeper.pointsPerPurchase': pointsPer,
            'roles.shopkeeper.rewards': rewards
          });
          if (currentUser.roles && currentUser.roles.shopkeeper) {
            currentUser.roles.shopkeeper.storeName = storeName;
            currentUser.roles.shopkeeper.storeDesc = storeDesc;
            currentUser.roles.shopkeeper.pointsPerPurchase = pointsPer;
            currentUser.roles.shopkeeper.rewards = rewards;
          }
        } else {
          await db.collection('users').doc(currentUid).update({ storeName, storeDesc, pointsPerPurchase: pointsPer, rewards });
          currentUser.storeName = storeName;
          currentUser.storeDesc = storeDesc;
          currentUser.pointsPerPurchase = pointsPer;
          currentUser.rewards = rewards;
        }
        document.getElementById('shopNameDisplay').innerText = storeName;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        // Regenerate QR with new points value
        var qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';
        var qrData = JSON.stringify({ storeId: currentUid, storeName: storeName, action: 'earn_points', pointsValue: pointsPer });
        var qrUrl = 'https://scan2earn.app/scan?data=' + encodeURIComponent(qrData);
        new QRCode(qrContainer, {
          text: qrUrl,
          width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
        alert('✅ Settings saved!');
      } catch(e) { alert('Error: ' + e.message); }
    }

    function copyWallet() {
      var walletText = document.getElementById('walletAddress').innerText;
      if (walletText && walletText !== 'Loading...') {
        navigator.clipboard.writeText(walletText)
          .then(function() { alert('Wallet address copied!'); })
          .catch(function() { alert('Could not copy'); });
      } else {
        alert('No wallet address available');
      }
    }

    function openAwardModal() { document.getElementById('pointsModal').classList.add('active'); }
    function closeModal()     { document.getElementById('pointsModal').classList.remove('active'); }

    async function submitPoints() {
      var addr   = document.getElementById('customerAddress').value.trim();
      var points = parseInt(document.getElementById('pointsAmount').value) || 0;
      if (!addr || !points) { alert('Enter wallet address and points'); return; }
      try {
        var snap = await db.collection('users').where('walletAddress', '==', addr).get();
        if (snap.empty) { alert('Customer not found'); return; }
        var custDoc = snap.docs[0]; var custData = custDoc.data();
        var shopName = (currentUser.roles?.shopkeeper?.storeName) || currentUser.storeName || 'Store';
        if (custData.roles && custData.roles.customer) {
          var h = custData.roles.customer.history || [];
          h.unshift({ action: 'Earned ' + points + ' points from ' + shopName, date: new Date().toLocaleString(), points: points });
          await db.collection('users').doc(custDoc.id).update({ 
            'roles.customer.totalPoints': (custData.roles.customer.totalPoints || 0) + points, 
            'roles.customer.history': h 
          });
        } else {
          var h2 = custData.history || [];
          h2.unshift({ action: 'Earned ' + points + ' points from ' + shopName, date: new Date().toLocaleString(), points: points });
          await db.collection('users').doc(custDoc.id).update({ 
            totalPoints: (custData.totalPoints || 0) + points, 
            history: h2 
          });
        }
        alert('✅ ' + points + ' points awarded!');
        closeModal();
        document.getElementById('customerAddress').value = '';
        document.getElementById('pointsAmount').value = '10';
      } catch(e) { alert('Error: ' + e.message); }
    }

    function downloadQR() {
      var qrContainer = document.getElementById('qrcode');
      var canvas = qrContainer.querySelector('canvas');
      if (!canvas) {
        alert('QR code not ready yet. Please wait or try again.');
        return;
      }
      var a = document.createElement('a');
      a.download = 'store-qr.png';
      a.href = canvas.toDataURL();
      a.click();
    }

    function doLogout() {
      auth.signOut().then(function() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      }).catch(function() {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      });
    }

    // ── DARK MODE FIXED ────────────────────────────────────────────────────
    // This ensures the dark mode toggle works perfectly
    (function initDarkMode() {
      const darkModeToggle = document.getElementById('darkModeToggle');
      const darkModeIcon = document.getElementById('darkModeIcon');
      
      // Get initial dark mode state from localStorage
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      
      // Apply initial theme
      if (isDarkMode) {
        document.documentElement.classList.add('dark');
        darkModeIcon.classList.remove('fa-moon');
        darkModeIcon.classList.add('fa-sun');
      } else {
        document.documentElement.classList.remove('dark');
        darkModeIcon.classList.remove('fa-sun');
        darkModeIcon.classList.add('fa-moon');
      }
      
      // Toggle function
      function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark ? 'true' : 'false');
        
        // Update icon
        if (isDark) {
          darkModeIcon.classList.remove('fa-moon');
          darkModeIcon.classList.add('fa-sun');
        } else {
          darkModeIcon.classList.remove('fa-sun');
          darkModeIcon.classList.add('fa-moon');
        }
        
        // Force QR code to refresh if present (to maintain visibility)
        const qrContainer = document.getElementById('qrcode');
        if (qrContainer && qrContainer.hasChildNodes()) {
          // Small delay to let CSS transition complete
          setTimeout(() => {
            // Re-generate QR code to ensure proper colors in dark mode
            var storeName = document.getElementById('storeName').value.trim() || 'Store';
            var pointsPer = parseInt(document.getElementById('pointsPerPurchase').value) || 10;
            qrContainer.innerHTML = '';
            var qrData = JSON.stringify({ storeId: currentUid, storeName: storeName, action: 'earn_points', pointsValue: pointsPer });
            var qrUrl = 'https://scan2earn.app/scan?data=' + encodeURIComponent(qrData);
            try {
              new QRCode(qrContainer, {
                text: qrUrl,
                width: 200, height: 200, colorDark: '#000000', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
              });
            } catch(e) {}
          }, 50);
        }
      }
      
      // Add click event listener
      if (darkModeToggle) {
        darkModeToggle.addEventListener('click', toggleDarkMode);
      }
    })();
  </script>
</body>
</html>
